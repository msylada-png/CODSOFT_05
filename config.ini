# Configuration File for Fraud Detection Project
# Modify these settings to customize the analysis

[DATA]
# Path to your credit card CSV file
csv_file = creditcard.csv

# Target column name (the fraud indicator column)
target_column = Class

[PREPROCESSING]
# Test/Train split ratio
test_size = 0.2

# Random seed for reproducibility
random_state = 42

# Use stratified split to maintain class distribution
stratified = True

[CLASS_IMBALANCE]
# Method: SMOTE, RandomUndersampler, or None
method = SMOTE

# Only apply to training data (not test data)
apply_to_train_only = True

[MODELS]
# Model selection
use_logistic_regression = True
use_random_forest = True
use_xgboost = False

[LOGISTIC_REGRESSION]
# Maximum iterations for convergence
max_iterations = 1000

# Regularization strength (C parameter - lower = stronger regularization)
regularization_strength = 1.0

# Solver algorithm
solver = lbfgs

[RANDOM_FOREST]
# Number of trees in the forest
n_estimators = 100

# Maximum depth of trees (None = unlimited)
max_depth = None

# Minimum samples required to split a node
min_samples_split = 2

# Minimum samples required at leaf node
min_samples_leaf = 1

# Number of jobs for parallel processing (-1 = use all cores)
n_jobs = -1

[EVALUATION]
# Metrics to compute
compute_precision = True
compute_recall = True
compute_f1_score = True
compute_accuracy = True

# Generate confusion matrix
generate_confusion_matrix = True

# Generate classification report
generate_classification_report = True

[VISUALIZATION]
# Generate plots
generate_plots = True

# DPI for saved plots
plot_dpi = 100

# Figure size (width, height) in inches
figure_size = 14, 8

# Color scheme
color_genuine = #2ecc71
color_fraud = #e74c3c

[OUTPUT]
# Save predictions to CSV
save_predictions = False
predictions_file = predictions.csv

# Save model metrics
save_metrics = False
metrics_file = model_metrics.csv

# Save feature importance
save_feature_importance = False
importance_file = feature_importance.csv

[LOGGING]
# Verbosity: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Save logs to file
save_logs = False
log_file = fraud_detection.log

[SAMPLING]
# For initial exploration, use a subset (0.0 = all data, 0.5 = 50% of data)
sample_fraction = 1.0

# Number of samples to display in example predictions
n_examples = 20

[FEATURE_SELECTION]
# Select specific features (empty = all features)
# Example: Amount, Time, V1, V2
selected_features = 

# Drop specific features
# Example: V12, V15
dropped_features = 

[THRESHOLDS]
# Decision threshold for fraud classification (default 0.5)
classification_threshold = 0.5

# Minimum confidence for fraud classification
min_confidence = 0.0

[EXPERIMENTAL]
# Enable cross-validation
use_cross_validation = False
cv_folds = 5

# Enable GridSearchCV for hyperparameter tuning
use_grid_search = False

# Hyperparameter search space (if enabled)
# Format: param1=[val1,val2], param2=[val3,val4]
param_grid = 

[NOTES]
# Project description and notes
project_name = Credit Card Fraud Detection
project_description = ML model to identify fraudulent credit card transactions
version = 1.0
created_date = 2024
author = Data Science Team
